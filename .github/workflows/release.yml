name: release

# 태그(v*)를 푸시하거나 Actions 탭에서 수동 실행하면
# Windows(.msi/.exe) · macOS(.dmg/.app) · Linux(.deb/.AppImage) 설치본을 빌드해
# 초안(draft) GitHub Release에 첨부합니다.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    timeout-minutes: 30   # self-kill if notarization hangs (Apple notary -1009), instead of GitHub's 6h default
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest   # Apple Silicon (.dmg)
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest   # Intel (.dmg)
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04   # .deb / .AppImage
            args: ""
          - platform: windows-latest # .msi / .exe(NSIS)
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend deps
        run: npm ci

      - name: Build + bundle + release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS 코드 서명 (Developer ID) — 이 3개로 .app/.dmg를 서명합니다.
          # (비어 있으면 tauri-action이 미서명으로 진행하고, 다른 OS에선 무시됨)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # macOS 공증(notarize) — 비활성화. GitHub 러너↔Apple notary 연결이 지속적으로 hang됨
          # (notarytool이 제출 단계에서 출력 없이 멈춰 30분 타임아웃에 killed; -1009 no-route).
          # 인프라(러너↔Apple) 문제라 앱/자격증명과 무관. 재시도하려면 아래 3줄 주석 해제.
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Rune ${{ github.ref_name }}"
          releaseBody: "다운로드: 아래 Assets에서 OS에 맞는 설치본을 받으세요."
          # Publish immediately (not draft): a draft release is NOT findable by tag,
          # which makes concurrent matrix jobs race and drop assets. Published =
          # findable by tag → every platform job attaches its installer reliably.
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
