name: release

# 태그(v*)를 푸시하거나 Actions 탭에서 수동 실행하면
# Windows(.msi/.exe) · macOS(.dmg/.app) · Linux(.deb/.AppImage) 설치본을 빌드해
# 초안(draft) GitHub Release에 첨부합니다.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest   # Apple Silicon (.dmg)
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest   # Intel (.dmg)
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04   # .deb / .AppImage
            args: ""
          - platform: windows-latest # .msi / .exe(NSIS)
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend deps
        run: npm ci

      - name: Build + bundle + release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Rune ${{ github.ref_name }}"
          releaseBody: "다운로드: 아래 Assets에서 OS에 맞는 설치본을 받으세요."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
